name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npx vitest run

      - name: Build
        run: npm run build
        env:
          # Build-time placeholders — pages are dynamic and only connect at runtime
          MONGODB_URI: mongodb://localhost:27017/ci-build
          NEXTAUTH_SECRET: ci-build-placeholder-secret-0000
          NEXT_PUBLIC_BASE_URL: https://ci.invalid
